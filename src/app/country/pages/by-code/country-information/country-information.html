<section class="mx-3">
  <h1 class="text-3xl text-center sm:text-left">{{ country().name }}</h1>

  <section class="stats stats-vertical sm:stats-horizontal shadow mx-5">
    <div class="stat place-items-center">
      <div class="static-title">Population</div>
      <div class="stat-value">{{ country().population | number}}</div>
      <div class="stat-dec">Since {{ currentYear() }}</div>
    </div>

    <div class="stat place-items-center">
      <div class="static-title">Name</div>
      <div class="stat-value text-secondary text-center wrap-break-word whitespace-normal">{{ country().name}}</div>
      <div class="stat-dec text-secondary text-center wrap-break-word whitespace-normal">{{ country().region }}</div>
    </div>

    <div class="stat place-items-center">
      <div class="static-title">Sub Region</div>
      <div class="stat-value text-center wrap-break-word whitespace-normal">{{ country().subRegion}}</div>
      <div class="stat-dec text-center wrap-break-word whitespace-normal">{{ country().region }}</div>
    </div>

    <div class="stat place-items-center">
      <div class="static-title">Flag</div>
      <div class="stat-value">{{ country().flag}}</div>
      <div class="stat-dec text-center wrap-break-word whitespace-normal">{{ country().subRegion }}</div>
    </div>
  </section>

  <section class="mb-7">
    <figure class="diff aspect-video" tabindex="0">
      <div class="diff-item-1" role="img" tabindex="0">
        <img
          [alt]="country().name"
          [src]="country().flagSvg" />
      </div>
      <div class="diff-item-2" role="img">
        <img
          class="blur brightness-75"
          [alt]="country().name"
          [src]="country().flagSvg" />
      </div>
      <div class="diff-resizer"></div>
    </figure>
  </section>
</section>
